<div class="language-switch">
    <div class="language-selector">
        <button class="language-button" type="button" onclick="return toggleLanguageMenu()" aria-haspopup="true" aria-expanded="false">
            <span id="current-lang">English</span>
        </button>
        <div class="language-menu" id="language-menu">
            <a href="#" class="language-option" onclick="return switchLanguage('en')">English</a>
            <a href="#" class="language-option" onclick="return switchLanguage('zh')">中文</a>
        </div>
    </div>
</div>
